<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <script>
    window.L_DISABLE_3D = true;
  </script>
  <title>Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([48.6208, 22.2879], 13);
  const stationMarkers = [];

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);

  function addStationMarker(id, lat, lng, name) {
    const marker = L.marker([lat, lng]).addTo(map);
    marker.bindPopup(`<b>${name}</b>`);

    marker.on('click', function () {
      console.log("Marker clicked:", id);

      try {
        if (window.javaApp) {
          window.javaApp.selectStation(id);
        } else {
          console.log("window.javaApp is null");
        }
      } catch (e) {
        console.error("Error calling Java:", e);
      }
    });

    stationMarkers.push(marker);
  }

  function clearStationMarkers() {
    for (const marker of stationMarkers) {
      map.removeLayer(marker);
    }
    stationMarkers.length = 0;
  }
</script>
</body>
</html>
