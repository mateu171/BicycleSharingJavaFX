name: Build Installers

on:
  workflow_dispatch:

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  APP_NAME: BicycleSharing
  MAIN_CLASS: org.example.bicyclesharing.Launcher

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install WiX
        shell: powershell
        run: choco install wixtoolset --yes --no-progress

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Debug target
        shell: powershell
        run: dir target

      - name: Detect JAR
        shell: powershell
        run: |
          $jar = Get-ChildItem target/*.jar | Where-Object { $_.Name -notlike "*sources*" } | Select-Object -First 1
          echo "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Clean version
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace "^v", ""
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build MSI
        shell: powershell
        run: |
          jpackage `
            --type msi `
            --name "${{ env.APP_NAME }}" `
            --app-version "${{ env.VERSION }}" `
            --vendor "Serhii" `
            --input target `
            --main-jar "${{ env.JAR_NAME }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Rename installer
        shell: powershell
        run: |
          $file = Get-ChildItem dist/*.msi | Select-Object -First 1
          Move-Item $file.FullName "dist/${{ env.APP_NAME }}-Windows.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.msi


  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Debug target
        run: ls -la target

      - name: Detect JAR
        run: |
          JAR=$(ls target/*.jar | grep -v sources | head -n 1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Clean version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build DMG
        run: |
          jpackage \
            --type dmg \
            --name "${{ env.APP_NAME }}" \
            --app-version "${{ env.VERSION }}" \
            --vendor "Serhii" \
            --input target \
            --main-jar "${{ env.JAR_NAME }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest dist

      - name: Rename installer
        run: mv dist/*.dmg dist/${{ env.APP_NAME }}-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/*.dmg


  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Debug target
        run: ls -la target

      - name: Detect JAR
        run: |
          JAR=$(ls target/*.jar | grep -v sources | head -n 1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Clean version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build DEB
        run: |
          jpackage \
            --type deb \
            --name "${{ env.APP_NAME }}" \
            --app-version "${{ env.VERSION }}" \
            --vendor "Serhii" \
            --input target \
            --main-jar "${{ env.JAR_NAME }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest dist \
            --linux-shortcut

      - name: Rename installer
        run: mv dist/*.deb dist/${{ env.APP_NAME }}-Linux.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: dist/*.deb


  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Show files
        run: ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${GITHUB_REF_NAME#v}"
          generate_release_notes: true
          files: release-files/*