<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    window.L_DISABLE_3D = true;
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    .bike-div-icon {
      pointer-events: auto !important;
      cursor: pointer;
    }
    .bike-div-icon div {
      pointer-events: auto !important;
    }
  </style>

</head>
<body>
<div id="map"></div>

<script>
  var map = L.map('map', {
    tap: false,
    preferCanvas: true
  }).setView([48.6208, 22.2879], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    crossOrigin: true
  }).addTo(map);

  function onBikeClick(uuid, model) {
    console.log("Клік на велосипед: " + model);
    if (window.javaApp) {
      window.javaApp.showBikeModal(uuid);
    } else {
      alert("Модель: " + model + "\nUUID: " + uuid);
    }
  }

  function addBike(lat, lng, model, price, uuid) {
    var bikeIcon = L.divIcon({
      html: '<div class="bike-marker" data-uuid="' + uuid + '" data-model="' + model + '">' +
          '<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png" style="width:40px;height:40px;">' +
          '</div>',
      className: 'bike-div-icon',
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });

    var marker = L.marker([lat, lng], {
      icon: bikeIcon,
      interactive: true
    }).addTo(map);

    marker.on('click', function(e) {
      console.log("Marker clicked via Leaflet");
      // Отримуємо дані з HTML елемента
      var markerElement = e.target._icon;
      if (markerElement) {
        var bikeDiv = markerElement.querySelector('.bike-marker');
        if (bikeDiv) {
          var uuid = bikeDiv.getAttribute('data-uuid');
          var model = bikeDiv.getAttribute('data-model');
          onBikeClick(uuid, model);
        }
      }
    });

    marker.on('add', function() {
      var icon = this._icon;
      if (icon) {
        icon.style.cursor = 'pointer';
        icon.addEventListener('click', function(e) {
          e.stopPropagation();
          var bikeDiv = this.querySelector('.bike-marker');
          if (bikeDiv) {
            var uuid = bikeDiv.getAttribute('data-uuid');
            var model = bikeDiv.getAttribute('data-model');
            onBikeClick(uuid, model);
          }
        });
      }
    });
  }

  function clearMarkers() {
    map.eachLayer(function(layer) {
      if (layer instanceof L.Marker) {
        map.removeLayer(layer);
      }
    });
  }

  setTimeout(function() {
    map.invalidateSize();
  }, 500);
</script>
</body>
</html>
