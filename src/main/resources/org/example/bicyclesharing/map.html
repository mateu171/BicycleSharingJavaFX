<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    window.L_DISABLE_3D = true;
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    html, body, #map { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
  </style>

</head>
<body>
<div id="map"></div>

<script>
  window.onerror = function(msg, url, line) {
    if(window.javaApp) {
      console.log("JS Error: " + msg + " at " + line);
    }
    return false;
  };

  var map = L.map('map', { tap: false }).setView([48.6208, 22.2879], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  var bikeIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/2972/2972185.png',
    iconSize: [32,32],
    iconAnchor: [16,32],
    popupAnchor: [0,-30]
  });

  var bikeCluster = L.markerClusterGroup();
  map.addLayer(bikeCluster);

  function addBike(lat, lng, model, price, id){

    var marker = L.marker([lat,lng], {icon: bikeIcon});

    // 1. Create a unique ID for this specific button
    var btnId = "rent-btn-" + id;

    // 2. Insert the generated ID into the HTML.
    // We removed the inline onclick since we bind it dynamically below.
    var html =
        "<b>" + model + "</b><br>" +
        "Ціна: " + price + " грн/год<br><br>" +
        "<button id='" + btnId + "'>Орендувати</button>";

    marker.bindPopup(html);

    marker.on('popupopen', function() {
      // 3. Fetch the button using the ID we just created
      var btn = document.getElementById(btnId);

      // 4. Check if the button exists to prevent null reference errors
      if (btn) {
        L.DomEvent.disableClickPropagation(btn);

        // Attach the click event properly
        btn.onclick = function() {
          rentBike(id);
        };
      }
    });

    bikeCluster.addLayer(marker);
  }

  function rentBike(id){
    alert("Bike clicked: " + id);

    if(window.javaApp){
      window.javaApp.rentBike(id);
    } else {
      alert("Java bridge not found");
    }
  }
  setTimeout(function() {
    map.invalidateSize();
  }, 500);
</script>
</body>
</html>
