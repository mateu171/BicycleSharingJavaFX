name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  APP_NAME: BicycleSharing
  MAIN_CLASS: org.example.bicyclesharing.Launcher

jobs:

  # ================= WINDOWS =================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Prepare input
        shell: powershell
        run: |
          mkdir jpackage-input
          copy target\*-all.jar jpackage-input\app.jar
          mkdir dist

      - name: Get version
        shell: powershell
        run: echo "VERSION=${{ github.ref_name }}" -replace "^v","" >> $env:GITHUB_ENV

      - name: Build MSI
        shell: powershell
        run: |
          jpackage `
            --type msi `
            --name "${{ env.APP_NAME }}" `
            --app-version "${{ env.VERSION }}" `
            --vendor "Serhii" `
            --input jpackage-input `
            --main-jar app.jar `
            --main-class "${{ env.MAIN_CLASS }}" `
            --dest dist

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.msi


  # ================= LINUX =================
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Prepare input
        run: |
          mkdir -p jpackage-input dist
          cp target/*-all.jar jpackage-input/app.jar

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build DEB
        run: |
          jpackage \
            --type deb \
            --name "${APP_NAME}" \
            --app-version "${VERSION}" \
            --vendor "Serhii" \
            --input jpackage-input \
            --main-jar app.jar \
            --main-class "${MAIN_CLASS}" \
            --dest dist

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.deb


  # ================= MACOS =================
  macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Prepare input
        run: |
          mkdir -p jpackage-input dist
          cp target/*-all.jar jpackage-input/app.jar

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build DMG
        run: |
          jpackage \
            --type dmg \
            --name "${APP_NAME}" \
            --app-version "${VERSION}" \
            --vendor "Serhii" \
            --input jpackage-input \
            --main-jar app.jar \
            --main-class "${MAIN_CLASS}" \
            --dest dist

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg


  # ================= RELEASE =================
  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List files
        run: ls -R release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          generate_release_notes: true
          files: release/*