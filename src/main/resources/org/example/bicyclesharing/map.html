<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>

  <script>
    window.L_DISABLE_3D = true;
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
    }
  </style>

</head>

<body>

<div id="map"></div>

<script>

  var map = L.map('map').setView([48.6208, 22.2879], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    crossOrigin:true
  }).addTo(map);


  var bikeIcon = L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
    iconSize:[40,40],
    iconAnchor:[20,40],
    popupAnchor:[0,-40]
  });


  function addBike(lat, lng, model, price){

    var marker = L.marker([lat,lng],{icon:bikeIcon}).addTo(map);

    marker.bindPopup(
        "<b>"+model+"</b><br>"+
        "Ціна: "+price+" грн/год<br><br>"+
        "<button onclick='rentBike(\""+model+"\")'>Орендувати</button>"
    );

  }


  function rentBike(id){

    if(window.javaApp){
      javaApp.rentBike(id);
    }else{
      alert("Орендовано велосипед " + id);
    }

  }


  setTimeout(function(){
    map.invalidateSize();
  },300);

</script>

</body>
</html>
