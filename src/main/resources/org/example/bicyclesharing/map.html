<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <script>
    window.L_DISABLE_3D = true;
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    html, body, #map { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  var map = L.map('map').setView([48.6208, 22.2879], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  var bikeIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/2972/2972185.png',
    iconSize: [32,32],
    iconAnchor: [16,32]
  });

  var bikeCluster = L.markerClusterGroup();
  map.addLayer(bikeCluster);

  var markersMap = {};

  function addBike(lat, lng, model, price, id){

    var marker = L.marker([lat,lng], {icon: bikeIcon});

    markersMap[id] = marker;

    marker.bindPopup(
        "<b>" + model + "</b><br>" +
        "Ціна: " + price + " грн/год"
    );

    marker.on('click', function() {
      if(window.javaApp){
        window.javaApp.selectBike(id);
      }
    });

    bikeCluster.addLayer(marker);
  }

  function focusBike(id){

    var marker = markersMap[id];

    if(marker){
      bikeCluster.zoomToShowLayer(marker, function() {
        map.panTo(marker.getLatLng());
        marker.openPopup();
      });
    } else {
      console.log("Marker not found: " + id);
    }
  }
  setTimeout(function() {
    map.invalidateSize();
  }, 300);
</script>

</body>
</html>
